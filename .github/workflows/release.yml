name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Bundle into single file
        run: |
          npx esbuild dist/index.js \
            --bundle \
            --platform=node \
            --format=cjs \
            --outfile=mcp-server-salesforce.cjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mcp-server-salesforce.cjs
          generate_release_notes: true
